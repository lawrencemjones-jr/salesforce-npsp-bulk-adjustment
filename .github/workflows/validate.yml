name: Validate adjustment file

# Runs the pre-flight validation against the sample data on every push and PR.
# A green check confirms the bulk-adjustment file passes referential and key
# integrity checks before it would ever touch a live Salesforce org.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # allows manual runs from the Actions tab

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pre-flight validation
        run: |
          python validate_adjustment.py \
            --original batch_export_original.csv \
            --adjustment adjustment_upload.csv \
            --field "GAU Allocation" \
            --out adjustment_validated.csv
